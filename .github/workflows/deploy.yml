name: Deploy to Unraid

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Branch to deploy
        required: false
        default: main

concurrency:
  group: deploy-unraid
  cancel-in-progress: false

jobs:
  deploy:
    name: docker compose up
    runs-on: self-hosted
    steps:
      - name: Deploy stack
        env:
          DEPLOY_PATH: ${{ vars.PARCEL_SCRUBBER_DEPLOY_PATH }}
        run: |
          set -euo pipefail
          if [ -z "${DEPLOY_PATH:-}" ]; then
            echo "Set repository variable PARCEL_SCRUBBER_DEPLOY_PATH (e.g. /mnt/user/appdata/parcel-scrubber/app)"
            exit 1
          fi
          if [ ! -d "$DEPLOY_PATH" ]; then
            echo "Deploy path does not exist inside the runner: $DEPLOY_PATH"
            echo "If the runner is a Docker container, bind-mount the host app dir at the same path"
            echo "(see docs/deploy-unraid.md — GitHub Actions runner)."
            exit 1
          fi
          if ! docker info >/dev/null 2>&1; then
            echo "Docker is not available in this runner (mount /var/run/docker.sock?)."
            exit 1
          fi
          cd "$DEPLOY_PATH"
          git fetch origin
          git checkout "${{ inputs.ref }}"
          git pull --ff-only origin "${{ inputs.ref }}"
          docker compose up -d --build
