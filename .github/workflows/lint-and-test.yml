name: Lint and test

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: lint-and-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: web (lint & test)
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - run: npm run lint -w @parcel-scrubber/web

      - run: npm run test -w @parcel-scrubber/web -- --watch=false

  api:
    name: api (lint & test)
    runs-on: self-hosted
    env:
      E2E_DATABASE_URL: postgresql://parcel:parcel@postgres:5432/parcel_scrubber_test
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: parcel
          POSTGRES_PASSWORD: parcel
          POSTGRES_DB: parcel_scrubber_test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - run: npm run lint -w @parcel-scrubber/api

      - run: npm run test -w @parcel-scrubber/api

      - run: npm run test:e2e -w @parcel-scrubber/api
